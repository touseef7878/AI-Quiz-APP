services:
  - type: web
    name: quiz-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: QUIZ_QUESTIONS_COUNT
        value: 10

databases:
  - name: quiz-db
    databaseName: quiz_app
    user: quiz_user
